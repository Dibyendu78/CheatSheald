
# ─────────────────────────────────────────────────────────────────────
# Anti-Cheating Proctoring System — Docker Compose (Production / EC2)
#
# All environment variables are loaded from .env (project root).
# Copy .env.example → .env and fill in your values before running.
#
# Scale independently:
#   docker compose up --scale api=3 --scale worker=4
#
# Production ALB:
#   Enable sticky sessions (cookie-based, 2h duration)
# ─────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI WebSocket API (multi-instance) ───────────────────────────
  # NOTE: No container_name — that would block --scale.
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── ML Worker (scalable) ────────────────────────────────────────────
  # Scale: docker compose up --scale worker=4
  worker:
    build:
      context: ./worker_redis
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./best.pt:/app/best.pt:ro
      - ./yolov8n.pt:/app/yolov8n.pt:ro
      - ./face_landmarker.task:/app/face_landmarker.task:ro

    # These limits work with docker compose up (not Swarm)
    # c6i.xlarge: 4 vCPU, 8 GB RAM → safe for 4 workers × (1 CPU, 2 GB each)
    mem_limit: 2g
    cpus: 1.0

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"